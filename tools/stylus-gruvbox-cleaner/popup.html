<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stylus Gruvbox Cleaner</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #282828;
        --panel: #3c3836;
        --text: #ebdbb2;
        --muted: #bdae93;
        --accent: #d3869b;
        --danger: #fb4934;
        --ok: #b8bb26;
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 440px;
        margin: 0;
        padding: 14px;
        background: var(--bg);
        color: var(--text);
        font:
          13px/1.45 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 17px;
        font-weight: 700;
        color: var(--accent);
      }
      p {
        margin: 8px 0;
      }
      .muted {
        color: var(--muted);
      }
      .actions {
        display: flex;
        gap: 8px;
        margin: 12px 0;
      }
      button {
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 8px 10px;
        background: var(--panel);
        color: var(--text);
        font-weight: 650;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        color: var(--bg);
      }
      button.danger {
        background: var(--danger);
        color: #1d2021;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }
      label {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        margin: 8px 0;
        color: var(--muted);
      }
      #status {
        min-height: 20px;
        margin-top: 8px;
        color: var(--muted);
        white-space: pre-wrap;
      }
      #status.ok {
        color: var(--ok);
      }
      #status.error {
        color: var(--danger);
      }
      table {
        width: 100%;
        margin-top: 10px;
        border-collapse: collapse;
        background: rgba(60, 56, 54, 0.55);
      }
      th, td {
        padding: 6px 7px;
        border-bottom: 1px solid rgba(189, 174, 147, 0.18);
        text-align: left;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      td:first-child {
        width: 58px;
        color: var(--muted);
      }
      .empty {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid rgba(189, 174, 147, 0.22);
        border-radius: 6px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <h1>Stylus Gruvbox Cleaner</h1>
    <p class="muted">
      Deletes only Gruvbox Userstyles entries matched inside Stylus. A backup is
      downloaded before deletion.
    </p>

    <label>
      <input id="includeLegacy" type="checkbox" checked>
      <span>Include old unmarked legacy installs matched by two repo
        signals.</span>
    </label>

    <div class="actions">
      <button id="preview" class="primary">Preview</button>
      <button id="delete" class="danger" disabled>Delete matched styles</button>
    </div>

    <div id="status">Open Stylus Manage and preview matches.</div>
    <div id="results"></div>

    <script src="popup.js"></script>
  </body>
</html>
